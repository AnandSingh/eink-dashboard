services:
  server:
    build: ./server
    env_file: .env
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      # Syncthing drops glasses photos here; mount that host folder in.
      - ${INBOX_DIR_HOST:-./data/inbox}:/data/inbox
      - ./data:/data
    restart: unless-stopped

  # Optional: run Syncthing in the same stack to receive phone photos.
  # syncthing:
